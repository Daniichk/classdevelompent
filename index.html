<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Flow | by Nobody</title>
    <style>
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text-main: #1C1C1E;
            --text-sec: #8E8E93;
            --accent: #007AFF; /* Azul iOS */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 85%;
            max-width: 380px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        #subject-name {
            color: var(--text-sec);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        #countdown {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }
        .status-label {
            color: var(--accent);
            font-weight: 600;
            font-size: 1rem;
        }
        .footer-note {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #D1D1D6;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="subject-name">Cargando horario...</div>
        <div id="countdown">00:00</div>
        <div class="status-label" id="status-text">Calculando tiempo</div>
        
        <div class="footer-note">BUILT BY NOBODY</div>
    </div>

    <script>
        const schedule = {
            // Basado en tu imagen enviada
            slots: [
                { start: "08:20", end: "09:15", type: "class" },
                { start: "09:15", end: "10:10", type: "class" },
                { start: "10:10", end: "10:35", type: "recreo", name: "RECREO" },
                { start: "10:35", end: "11:30", type: "class" },
                { start: "11:30", end: "12:25", type: "class" },
                { start: "12:25", end: "12:35", type: "recreo", name: "RECREO" },
                { start: "12:35", end: "13:30", type: "class" },
                { start: "13:30", end: "15:00", type: "recreo", name: "MEDIODÍA" },
                { start: "15:00", end: "15:55", type: "class" },
                { start: "15:55", end: "16:50", type: "class" }
            ],
            days: {
                1: ["EF", "VAL", "INGL", "FRAN", "LCyL", "TUT", "MATS"], // Lunes
                2: ["FyQ", "EDPyV", "INGL", "MUS", "LCyL", "ABSR", "MATS"], // Martes
                3: ["ABSR", "MUS", "FyQ", "LCyL", "INGL"], // Miércoles (solo mañana)
                4: ["FRAN", "MATS", "FyQ", "VAL", "INGL", "EF", "ABSR"], // Jueves
                5: ["MATS", "VAL", "FRAN", "EDPyV", "ABSR"] // Viernes
            }
        };

        function updateApp() {
            const now = new Date();
            const day = now.getDay(); // 1 = Lunes, 5 = Viernes
            const currentH = now.getHours();
            const currentM = now.getMinutes();
            const currentTimeStr = `${currentH.toString().padStart(2, '0')}:${currentM.toString().padStart(2, '0')}`;
            
            let displaySubject = "LIBRE";
            let displayTime = "00:00";
            let displayStatus = "Fuera de horario";

            if (day >= 1 && day <= 5) {
                const todayLessons = schedule.days[day] || [];
                let classCounter = 0;

                for (const slot of schedule.slots) {
                    if (currentTimeStr >= slot.start && currentTimeStr < slot.end) {
                        // Estamos dentro de este bloque
                        if (slot.type === "recreo") {
                            displaySubject = slot.name;
                            displayStatus = "para volver a clase";
                        } else {
                            displaySubject = "CLASE: " + (todayLessons[classCounter] || "S/N");
                            displayStatus = "para el timbre";
                        }

                        // Calcular cuenta atrás
                        const [endH, endM] = slot.end.split(':').map(Number);
                        const endSecs = (endH * 3600) + (endM * 60);
                        const nowSecs = (currentH * 3600) + (currentM * 60) + now.getSeconds();
                        
                        const diff = endSecs - nowSecs;
                        const m = Math.floor(diff / 60);
                        const s = diff % 60;
                        
                        displayTime = `${m}:${s.toString().padStart(2, '0')}`;
                        break;
                    }
                    if (slot.type === "class") classCounter++;
                }
            }

            document.getElementById('subject-name').innerText = displaySubject;
            document.getElementById('countdown').innerText = displayTime;
            document.getElementById('status-text').innerText = displayStatus;
        }

        setInterval(updateApp, 1000);
        updateApp();
    </script>
</body>
</html>
