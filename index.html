<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Flow | Enterprise Edition</title>
    <style>
        :root {
            --bg: #F8F9FB; /* Светлый корпоративный фон */
            --accent: #4F46E5; /* Индиго (как у Stripe/Apple) */
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px); /* Эффект стекла */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            padding: 50px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        #subject-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-primary);
        }

        #countdown {
            font-size: 6rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 10px 0;
            color: var(--text-primary);
        }

        .status-label {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .brand {
            margin-top: 50px;
            font-size: 0.65rem;
            color: #9CA3AF;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="badge" id="day-badge">Lunes</div>
            <p id="subject-name">Cargando...</p>
            <div id="countdown">00:00</div>
            <div class="status-label" id="status-text">Analizando sistema</div>
        </div>
        
        <div class="brand">Engineered by Nobody</div>
    </div>

    <script>
        // Код логики остается прежним, обновляем только вывод
        const schedule = {
            slots: [
                { start: "08:20", end: "09:15", type: "class" },
                { start: "09:15", end: "10:10", type: "class" },
                { start: "10:10", end: "10:35", type: "recreo", name: "RECREO" },
                { start: "10:35", end: "11:30", type: "class" },
                { start: "11:30", end: "12:25", type: "class" },
                { start: "12:25", end: "12:35", type: "recreo", name: "RECREO" },
                { start: "12:35", end: "13:30", type: "class" },
                { start: "13:30", end: "15:00", type: "recreo", name: "MEDIODÍA" },
                { start: "15:00", end: "15:55", type: "class" },
                { start: "15:55", end: "16:50", type: "class" }
            ],
            days: {
                1: ["EF", "VAL", "INGL", "FRAN", "LCyL", "TUT", "MATS"],
                2: ["FyQ", "EDPyV", "INGL", "MUS", "LCyL", "ABSR", "MATS"],
                3: ["ABSR", "MUS", "FyQ", "LCyL", "INGL"],
                4: ["FRAN", "MATS", "FyQ", "VAL", "INGL", "EF", "ABSR"],
                5: ["MATS", "VAL", "FRAN", "EDPyV", "ABSR"]
            },
            names: ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"]
        };

        function updateApp() {
            const now = new Date();
            const day = now.getDay();
            const currentH = now.getHours();
            const currentM = now.getMinutes();
            const timeStr = `${currentH.toString().padStart(2, '0')}:${currentM.toString().padStart(2, '0')}`;
            
            document.getElementById('day-badge').innerText = schedule.names[day];

            let found = false;
            if (day >= 1 && day <= 5) {
                const lessons = schedule.days[day] || [];
                let cCount = 0;

                for (const slot of schedule.slots) {
                    if (timeStr >= slot.start && timeStr < slot.end) {
                        const name = slot.type === "recreo" ? slot.name : (lessons[cCount] || "Clase");
                        document.getElementById('subject-name').innerText = name;
                        
                        const [eH, eM] = slot.end.split(':').map(Number);
                        const diff = ((eH * 60 + eM) * 60) - ((currentH * 60 + currentM) * 60 + now.getSeconds());
                        
                        const m = Math.floor(diff / 60);
                        const s = diff % 60;
                        document.getElementById('countdown').innerText = `${m}:${s.toString().padStart(2, '0')}`;
                        document.getElementById('status-text').innerText = "tiempo restante";
                        found = true;
                        break;
                    }
                    if (slot.type === "class") cCount++;
                }
            }

            if (!found) {
                document.getElementById('subject-name').innerText = "Fuera de Servicio";
                document.getElementById('countdown').innerText = "--:--";
                document.getElementById('status-text').innerText = "Disfruta tu tiempo libre";
            }
        }

        setInterval(updateApp, 1000);
        updateApp();
    </script>
</body>
</html>
