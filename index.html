<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Flow | Enterprise Edition</title>
    <style>
        :root {
            --accent: #4F46E5; 
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #EEF2FF, #E0E7FF, #C7D2FE, #DBEAFE);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        #subject-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-primary);
        }

        #countdown {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 10px 0;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .status-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .today-schedule {
            text-align: left;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 20px;
            margin-bottom: 20px;
        }

        .today-title {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .class-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .class-tag {
            font-size: 0.7rem;
            padding: 4px 10px;
            background: rgba(0,0,0,0.04);
            border-radius: 8px;
            font-weight: 600;
        }

        .class-tag.active {
            background: var(--accent);
            color: white;
        }

        .btn-notify {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-notify:hover {
            background: var(--accent);
            color: white;
        }

        .brand {
            margin-top: 30px;
            font-size: 0.6rem;
            color: #6B7280;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="badge" id="day-badge">...</div>
            <p id="subject-name">Cargando...</p>
            <div id="countdown">00:00</div>
            <div class="status-label" id="status-text">Sincronizando</div>

            <div class="today-schedule">
                <div class="today-title">Plan para hoy</div>
                <div class="class-list" id="today-classes"></div>
            </div>

            <button class="btn-notify" onclick="requestNotify()">🔔 Probar Notificaciones</button>
        </div>
        
        <div class="brand">Engineered by Nobody</div>
    </div>

    <script>
        const scheduleData = {
            slots: [
                { start: "08:20", end: "09:15", type: "class" },
                { start: "09:15", end: "10:10", type: "class" },
                { start: "10:10", end: "10:35", type: "recreo", name: "RECREO" },
                { start: "10:35", end: "11:30", type: "class" },
                { start: "11:30", end: "12:25", type: "class" },
                { start: "12:25", end: "12:35", type: "recreo", name: "RECREO" },
                { start: "12:35", end: "13:30", type: "class" },
                { start: "13:30", end: "15:00", type: "recreo", name: "MEDIODÍA" },
                { start: "15:00", end: "15:55", type: "class" },
                { start: "15:55", end: "16:50", type: "class" }
            ],
            days: {
                1: ["EF", "VAL", "INGL", "FRAN", "LCyL", "TUT", "MATS"],
                2: ["FyQ", "EDPyV", "INGL", "MUS", "LCyL", "ABSR", "MATS"],
                3: ["ABSR", "MUS", "FyQ", "LCyL", "INGL"],
                4: ["FRAN", "MATS", "FyQ", "VAL", "INGL", "EF", "ABSR"],
                5: ["MATS", "VAL", "FRAN", "EDPyV", "ABSR"]
            },
            dayNames: ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"]
        };

        let notificationSent = false;

        function requestNotify() {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    new Notification("¡Sistema Activo!", { body: "Recibirás un aviso 5 min antes del timbre." });
                }
            });
        }

        function sendSmartNotify(mins, subject) {
            if (Notification.permission === "granted" && mins === 5 && !notificationSent) {
                const n = new Notification("¡Solo quedan 5 minutos!", {
                    body: `La clase de ${subject} está terminando. Haz clic para ver el tiempo.`,
                    icon: "https://cdn-icons-png.flaticon.com"
                });
                n.onclick = () => { window.focus(); n.close(); };
                notificationSent = true;
            }
            if (mins !== 5) notificationSent = false;
        }

        function initDailyPlan(day) {
            const list = document.getElementById('today-classes');
            list.innerHTML = '';
            const lessons = scheduleData.days[day] || [];
            lessons.forEach(sub => {
                if (sub) {
                    const s = document.createElement('span');
                    s.className = 'class-tag';
                    s.id = `tag-${sub}`;
                    s.innerText = sub;
                    list.appendChild(s);
                }
            });
        }

        function update() {
            const now = new Date();
            const day = now.getDay();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            const timeStr = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            
            document.getElementById('day-badge').innerText = scheduleData.dayNames[day];

            let found = false;
            if (day >= 1 && day <= 5) {
                const todayLessons = scheduleData.days[day] || [];
                let cCount = 0;

                for (const slot of scheduleData.slots) {
                    if (timeStr >= slot.start && timeStr < slot.end) {
                        const name = slot.type === "recreo" ? slot.name : (todayLessons[cCount] || "Clase");
                        document.getElementById('subject-name').innerText = name;
                        
                        const [eH, eM] = slot.end.split(':').map(Number);
                        const diff = ((eH * 3600) + (eM * 60)) - ((h * 3600) + (m * 60) + s);
                        
                        const minsLeft = Math.floor(diff / 60);
                        document.getElementById('countdown').innerText = `${minsLeft}:${(diff % 60).toString().padStart(2, '0')}`;
                        document.getElementById('status-text').innerText = "tiempo restante";
                        
                        sendSmartNotify(minsLeft, name);

                        document.querySelectorAll('.class-tag').forEach(t => t.classList.remove('active'));
                        const activeTag = document.getElementById(`tag-${name}`);
                        if (activeTag) activeTag.classList.add('active');

                        found = true; break;
                    }
                    if (slot.type === "class") cCount++;
                }
            }

            if (!found) {
                document.getElementById('subject-name').innerText = "Fuera de Servicio";
                document.getElementById('countdown').innerText = "--:--";
                document.getElementById('status-text').innerText = "Disfruta tu tiempo libre";
            }
        }

        initDailyPlan(new Date().getDay());
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
