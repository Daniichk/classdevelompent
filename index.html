<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Global Assistant</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        .stealth { filter: grayscale(1) contrast(0.5) opacity(0.5); pointer-events: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans h-screen flex flex-col" id="app">

    <!-- Navbar -->
    <nav class="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-xl">🎓</span>
            <h1 class="font-bold text-slate-700" id="ui-title">Academic Assistant</h1>
        </div>
        <div class="flex gap-3">
            <select id="lang-select" onchange="changeLang()" class="text-xs border rounded p-1 bg-slate-50 outline-none">
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
            <button onclick="toggleStealth()" class="text-xs hover:underline text-slate-400">Panic Mode</button>
        </div>
    </nav>

    <!-- Chat Area -->
    <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
        <div class="bg-white border p-4 rounded-2xl shadow-sm max-w-[85%] text-sm text-slate-600" id="ui-welcome">
            Hello! How can I assist with your studies today?
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-white border-t">
        <div class="max-w-3xl mx-auto flex gap-2 bg-slate-100 p-2 rounded-2xl border focus-within:border-blue-400 transition">
            <input type="text" id="user-input" placeholder="Type your question..." 
                   class="flex-1 bg-transparent outline-none px-3 py-2 text-sm text-slate-700">
            <button onclick="sendMessage()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-medium hover:bg-blue-700 active:scale-95 transition shadow-md">
                Send
            </button>
        </div>
        <p class="text-[10px] text-center mt-2 text-slate-400">Powered by Llama3 Academic Research Engine</p>
    </div>

    <script>
        // 1. ВСТАВЬ СВОЙ КЛЮЧ BASE64 ТУТ:
        const b64_key = "Z3NrX3RDS3FRSWs2MmJtVXZIUG14THVuV0dkeWIzRllrNmhrTXBQVGhrRUNpN041aUlIeno0M24="; 
        const API_KEY = atob(b64_key);

        const translations = {
            en: {
                title: "Academic Assistant",
                welcome: "Hello! How can I assist with your studies today?",
                placeholder: "Type your question...",
                send: "Send"
            },
            es: {
                title: "Asistente Académico",
                welcome: "¡Hola! ¿Cómo puedo ayudarte con tus estudios hoy?",
                placeholder: "Escribe tu pregunta...",
                send: "Enviar"
            }
        };

        function changeLang() {
            const lang = document.getElementById('lang-select').value;
            document.getElementById('ui-title').innerText = translations[lang].title;
            document.getElementById('ui-welcome').innerText = translations[lang].welcome;
            document.getElementById('user-input').placeholder = translations[lang].placeholder;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const msg = input.value.trim();
            if(!msg) return;

            // User Message
            chatBox.innerHTML += `<div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] ml-auto text-sm animate-fade-in">${msg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("https://groq.com", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role: "system", content: "You are a helpful school assistant. Keep answers concise."}, {role: "user", content: msg}]
                    })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;

                chatBox.innerHTML += `<div class="bg-white border p-4 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-sm text-slate-700">${aiMsg}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch(e) {
                console.error(e);
            }
        }

        function toggleStealth() {
            document.getElementById('app').classList.toggle('stealth');
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
