<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASS.BEV | Next-Gen Game Studios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }
        .hero-pattern {
            background-color: #060b16;
            background-image: radial-gradient(circle at 2px 2px, rgba(59, 130, 246, 0.1) 1px, transparent 0);
            background-size: 30px 30px;
        }
        .text-gradient { 
            background: linear-gradient(180deg, #fff 0%, #60a5fa 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .shield-glow { box-shadow: 0 0 50px -12px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body x-data="{ 
    lang: 'en',
    content: {
        en: {
            nav1: 'Games', nav2: 'Engine', nav3: 'Shield', nav4: 'Studio',
            heroTag: 'IMMERSIVE DIGITAL WORLDS',
            heroTitle: 'Engineering the Future of Play.',
            heroSub: 'CLASS.BEV develops high-fidelity interactive experiences powered by proprietary real-time physics and ultra-low latency networking.',
            ctaPrimary: 'Explore Our Games',
            ctaSecondary: 'Developer Portal',
            metric1: 'Active Players', metric2: 'Physics Refresh Rate', metric3: 'Global Game Servers',
            shieldTitle: 'LIQUID.SHIELD™ INTEGRATION',
            shieldDesc: 'Our proprietary kernel-level protection and fluid-dynamics engine. LIQUID.SHIELD ensures fair play and hyper-realistic environmental interaction in every frame.',
            footer: '© 2024 CLASS.BEV STUDIOS. ALL RIGHTS RESERVED.'
        },
        es: {
            nav1: 'Juegos', nav2: 'Motor', nav3: 'Escudo', nav4: 'Estudio',
            heroTag: 'MUNDOS DIGITALES INMERSIVOS',
            heroTitle: 'Diseñando el Futuro del Juego.',
            heroSub: 'CLASS.BEV desarrolla experiencias interactivas de alta fidelidad impulsadas por física en tiempo real y redes de latencia ultra baja.',
            ctaPrimary: 'Explorar Juegos',
            ctaSecondary: 'Portal de Desarrolladores',
            metric1: 'Jugadores Activos', metric2: 'Tasa de Refresco de Física', metric3: 'Servidores Globales',
            shieldTitle: 'INTEGRACIÓN LIQUID.SHIELD™',
            shieldDesc: 'Nuestra protección a nivel de núcleo y motor de dinámica de fluidos. LIQUID.SHIELD garantiza el juego limpio y una interacción ambiental hiperrealista.',
            footer: '© 2024 CLASS.BEV STUDIOS. TODOS LOS DERECHOS RESERVADOS.'
        }
    }
}" x-cloak>

    <!-- Top Utility Bar -->
    <div class="bg-slate-950 text-slate-400 py-2 px-6 md:px-10 text-[10px] font-bold tracking-widest uppercase">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex space-x-4">
                <span>Server Status: <span class="text-emerald-500">Online</span></span>
                <span class="hidden md:inline">|</span>
                <span class="hidden md:inline">Patch 4.2 Deploying...</span>
            </div>
            <div class="flex items-center space-x-4 md:space-x-6">
                <button @click="lang = 'en'" :class="lang === 'en' ? 'text-white' : 'hover:text-white'" class="transition">EN</button>
                <button @click="lang = 'es'" :class="lang === 'es' ? 'text-white' : 'hover:text-white'" class="transition">ES</button>
                <a href="#" class="bg-blue-600 text-white px-3 py-1 rounded-sm hover:bg-blue-500 transition">Player Login</a>
            </div>
        </div>
    </div>

    <!-- Header -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 md:px-10 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-8">
                <div class="text-2xl font-black tracking-tighter text-slate-900 flex items-center">
                    <div class="w-2 h-8 bg-blue-600 mr-1"></div>
                    CLASS<span class="text-blue-600 font-light">.BEV</span>
                </div>
                <div class="hidden lg:flex space-x-8 text-[11px] font-bold uppercase tracking-wider text-slate-500">
                    <a href="#" class="hover:text-blue-600 transition" x-text="content[lang].nav1"></a>
                    <a href="#" class="hover:text-blue-600 transition" x-text="content[lang].nav2"></a>
                    <a href="#" class="hover:text-blue-600 transition" x-text="content[lang].nav3"></a>
                    <a href="#" class="hover:text-blue-600 transition" x-text="content[lang].nav4"></a>
                </div>
            </div>
            <button class="hidden sm:block bg-slate-900 text-white px-6 py-2 text-[11px] font-bold uppercase tracking-widest hover:bg-blue-600 transition">
                Join Beta
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-pattern text-white py-24 lg:py-48 px-6 md:px-10">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center space-x-4 mb-8">
                <span class="h-[1px] w-12 bg-blue-500"></span>
                <span class="text-blue-400 text-xs font-bold tracking-[0.3em]" x-text="content[lang].heroTag"></span>
            </div>
            <h1 class="text-5xl lg:text-8xl font-black tracking-tight mb-10 text-gradient max-w-4xl" x-text="content[lang].heroTitle"></h1>
            <p class="text-slate-400 text-xl md:text-2xl max-w-2xl font-light mb-12 leading-relaxed" x-text="content[lang].heroSub"></p>
            <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-6">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 text-xs font-bold uppercase tracking-widest transition shadow-lg shadow-blue-500/20" x-text="content[lang].ctaPrimary"></button>
                <button class="bg-transparent border border-slate-700 hover:border-blue-500 text-white px-10 py-5 text-xs font-bold uppercase tracking-widest transition" x-text="content[lang].ctaSecondary"></button>
            </div>
        </div>
    </section>

    <!-- LIQUID.SHIELD Deep Dive -->
    <section class="bg-white py-32 px-6 md:px-10 overflow-hidden">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-20 items-center">
            <div class="relative">
                <div class="absolute -top-10 -left-10 w-64 h-64 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
                <div class="relative bg-slate-900 p-8 md:p-16 shield-glow border border-blue-500/30 rounded-xl">
                    <div class="flex items-center space-x-2 mb-6">
                        <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
                        <span class="text-blue-400 font-mono text-xs tracking-tighter uppercase">Active Protocol: SHIELD_v4.2</span>
                    </div>
                    <h2 class="text-4xl font-bold text-white mb-6" x-text="content[lang].shieldTitle"></h2>
                    <p class="text-slate-400 text-lg leading-relaxed mb-8" x-text="content[lang].shieldDesc"></p>
                    <ul class="space-y-4 text-sm text-slate-300 font-bold uppercase tracking-wide">
                        <li class="flex items-center"><span class="w-1.5 h-1.5 bg-blue-500 mr-3"></span> Zero-Latency Anti-Cheat</li>
                        <li class="flex items-center"><span class="w-1.5 h-1.5 bg-blue-500 mr-3"></span> Dynamic Fluid Simulations</li>
                        <li class="flex items-center"><span class="w-1.5 h-1.5 bg-blue-500 mr-3"></span> Algorithmic Matchmaking</li>
                    </ul>
                </div>
            </div>
            <div>
                <div class="mb-12">
                    <h3 class="text-slate-400 text-xs font-bold tracking-[0.3em] uppercase mb-4">Performance Metrics</h3>
                    <div class="grid grid-cols-1 gap-8">
                        <div class="border-b border-slate-200 pb-6">
                            <div class="text-5xl font-bold text-slate-900 mb-2">2.4<span class="text-blue-600">M</span></div>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" x-text="content[lang].metric1"></p>
                        </div>
                        <div class="border-b border-slate-200 pb-6">
                            <div class="text-5xl font-bold text-slate-900 mb-2">240<span class="text-blue-600">Hz</span></div>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" x-text="content[lang].metric2"></p>
                        </div>
                        <div class="pb-6">
                            <div class="text-5xl font-bold text-slate-900 mb-2">84</div>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" x-text="content[lang].metric3"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-slate-950 py-16 px-6 md:px-10 border-t border-slate-900">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center space-y-8 md:space-y-0">
            <div class="text-2xl font-black tracking-tighter text-white flex items-center">
                <div class="w-1 h-6 bg-blue-600 mr-1"></div>
                CLASS<span class="text-blue-600 font-light">.BEV</span>
            </div>
            <div class="text-slate-600 text-[10px] font-bold tracking-[0.3em] uppercase" x-text="content[lang].footer"></div>
        </div>
    </footer>

</body>
</html>
