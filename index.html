<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASS.DEV | Advanced Entertainment Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }
        .hero-pattern {
            background-color: #0f172a;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .text-gradient { background: linear-gradient(180deg, #fff 0%, #cbd5e1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body x-data="{ 
    lang: 'en',
    content: {
        en: {
            nav1: 'Solutions', nav2: 'Network', nav3: 'Security', nav4: 'Company',
            heroTag: 'GLOBAL SYSTEMS ARCHITECTURE',
            heroTitle: 'Scalable Infrastructure for the Digital Era.',
            heroSub: 'CLASS.DEV engineers high-availability environments that sustain millions of concurrent interactions with sub-millisecond precision.',
            ctaPrimary: 'Explore Solutions',
            ctaSecondary: 'Technical Specs',
            metric1: 'Uptime SLA', metric2: 'Global Edge Nodes', metric3: 'Secure Transactions',
            footer: '© 2024 CLASS.DEV SYSTEMS INC. ALL RIGHTS RESERVED.'
        },
        es: {
            nav1: 'Soluciones', nav2: 'Red', nav3: 'Seguridad', nav4: 'Empresa',
            heroTag: 'ARQUITECTURA DE SISTEMAS GLOBALES',
            heroTitle: 'Infraestructura Escalable para la Era Digital.',
            heroSub: 'CLASS.DEV diseña entornos de alta disponibilidad que mantienen millones de interacciones concurrentes con precisión de milisegundos.',
            ctaPrimary: 'Explorar Soluciones',
            ctaSecondary: 'Especificaciones',
            metric1: 'Acuerdo de Nivel de Servicio', metric2: 'Nodos Globales', metric3: 'Transacciones Seguras',
            footer: '© 2024 CLASS.DEV SYSTEMS INC. TODOS LOS DERECHOS RESERVADOS.'
        }
    }
}">

    <!-- Top Utility Bar (Language & Regional only) -->
    <div class="bg-slate-950 text-slate-400 py-2 px-10 text-[10px] font-bold tracking-widest uppercase">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex space-x-4">
                <span>Security Status: <span class="text-emerald-500">Operational</span></span>
                <span class="hidden md:inline">|</span>
                <span class="hidden md:inline">Global Support: 24/7/365</span>
            </div>
            <div class="flex items-center space-x-6">
                <!-- Language Switcher -->
                <button @click="lang = 'en'" :class="lang === 'en' ? 'text-white' : 'hover:text-white'" class="transition">EN</button>
                <button @click="lang = 'es'" :class="lang === 'es' ? 'text-white' : 'hover:text-white'" class="transition">ES</button>
                <a href="#" class="bg-blue-600 text-white px-3 py-1 rounded-sm">Client Login</a>
            </div>
        </div>
    </div>

    <!-- Corporate Header -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-10 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-8">
                <div class="text-2xl font-black tracking-tighter text-slate-900 flex items-center">
                    <div class="w-2 h-8 bg-blue-600 mr-1"></div>
                    CLASS<span class="text-blue-600 font-light">SYSTEMS</span>
                </div>
                <div class="hidden lg:flex space-x-8 text-[11px] font-bold uppercase tracking-wider text-slate-500">
                    <a href="#" class="hover:text-blue-600 transition" x-text="content[lang].nav1"></a>
                    <a href="#" class="hover:text-blue-600 transition" x-text="content[lang].nav2"></a>
                    <a href="#" class="hover:text-blue-600 transition" x-text="content[lang].nav3"></a>
                    <a href="#" class="hover:text-blue-600 transition" x-text="content[lang].nav4"></a>
                </div>
            </div>
            <button class="text-slate-900 border-2 border-slate-900 px-6 py-2 text-[11px] font-bold uppercase tracking-widest hover:bg-slate-900 hover:text-white transition">
                Contact Sales
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-pattern text-white py-32 lg:py-48 px-10">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center space-x-4 mb-8">
                <span class="h-[1px] w-12 bg-blue-500"></span>
                <span class="text-blue-400 text-xs font-bold tracking-[0.3em]" x-text="content[lang].heroTag"></span>
            </div>
            <h1 class="text-6xl lg:text-8xl font-black tracking-tight mb-10 text-gradient max-w-4xl" x-text="content[lang].heroTitle"></h1>
            <p class="text-slate-400 text-xl md:text-2xl max-w-2xl font-light mb-12 leading-relaxed" x-text="content[lang].heroSub"></p>
            <div class="flex space-x-6">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 text-xs font-bold uppercase tracking-widest shadow-xl shadow-blue-900/20 transition" x-text="content[lang].ctaPrimary"></button>
                <button class="bg-transparent border border-slate-700 hover:border-slate-500 text-white px-10 py-5 text-xs font-bold uppercase tracking-widest transition" x-text="content[lang].ctaSecondary"></button>
            </div>
        </div>
    </section>

    <!-- Metrics (Institutional Trust) -->
    <section class="bg-white py-24 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-10 grid grid-cols-1 md:grid-cols-3 gap-16">
            <div class="border-l-4 border-blue-600 pl-8">
                <div class="text-5xl font-bold text-slate-900 mb-2">99.99<span class="text-blue-600">%</span></div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" x-text="content[lang].metric1"></p>
            </div>
            <div class="border-l-4 border-slate-200 pl-8">
                <div class="text-5xl font-bold text-slate-900 mb-2">4,200+</div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" x-text="content[lang].metric2"></p>
            </div>
            <div class="border-l-4 border-slate-200 pl-8">
                <div class="text-5xl font-bold text-slate-900 mb-2">12B+</div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest" x-text="content[lang].metric3"></p>
            </div>
        </div>
    </section>

    <!-- Core Business Units -->
    <section class="py-32 px-10 max-w-7xl mx-auto">
        <div class="grid lg:grid-cols-2 gap-1 px-1 bg-slate-200 border border-slate-200 shadow-2xl">
            <div class="bg-white p-16 hover:bg-slate-50 transition">
                <span class="text-blue-600 font-bold text-[10px] tracking-[0.2em] uppercase">Enterprise Simulation</span>
                <h3 class="text-3xl font-bold text-slate-900 mt-4 mb-6 tracking-tight">LLAMA_CLICKER.SaaS</h3>
                <p class="text-slate-500 text-lg leading-relaxed mb-10" x-text="lang === 'en' ? 'Industrial-grade engagement engine designed for testing network stress and user behavioral patterns.' : 'Motor de compromiso de grado industrial diseñado para probar el estrés de la red.'"></p>
                <a href="#" class="text-blue-600 font-bold text-xs uppercase tracking-widest border-b-2 border-blue-600 pb-1">View Case Study</a>
            </div>
            <div class="bg-white p-16 hover:bg-slate-50 transition">
                <span class="text-slate-400 font-bold text-[10px] tracking-[0.2em] uppercase">Competitive Frameworks</span>
                <h3 class="text-3xl font-bold text-slate-900 mt-4 mb-6 tracking-tight">PROJECT_BRAWL</h3>
                <p class="text-slate-500 text-lg leading-relaxed mb-10" x-text="lang === 'en' ? 'Proprietary ultra-low latency infrastructure for high-stakes competitive digital environments.' : 'Infraestructura de latencia ultra baja para entornos digitales competitivos de alto nivel.'"></p>
                <span class="inline-block bg-slate-100 text-slate-500 px-4 py-1 text-[10px] font-bold uppercase tracking-widest">Internal Deployment Only</span>
            </div>
        </div>
    </section>

    <!-- Global Footer -->
    <footer class="bg-slate-950 text-white py-20 px-10">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="mb-8 md:mb-0">
                <div class="text-xl font-bold tracking-tighter mb-4">CLASS<span class="text-blue-500">SYSTEMS</span></div>
                <p class="text-slate-500 text-[11px] tracking-widest uppercase font-bold" x-text="content[lang].footer"></p>
            </div>
            <div class="flex space-x-12 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                <a href="#" class="hover:text-white transition">Privacy</a>
                <a href="#" class="hover:text-white transition">Compliance</a>
                <a href="#" class="hover:text-white transition">Trust Center</a>
                <a href="#" class="hover:text-white transition">System Status</a>
            </div>
        </div>
    </footer>

</body>
</html>
